<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Fraud Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Your Original Color Palette & Typography */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: #c5c6c7; }
        h1, .navbar-brand { color: #66fcf1 !important; border-bottom: 1px solid #45a29e; padding-bottom: 5px; }
        
        /* Enhanced Terminal Feed matching your style */
        .terminal-feed {
            height: 650px;
            overflow-y: auto;
            background-color: #1f2833; /* Your original card background */
            border: 1px solid #45a29e;
            border-radius: 6px;
            padding: 15px;
        }
        .stat-card { background-color: #1f2833; border: 1px solid #45a29e; }
        
        /* Your Original Transaction Card Styles */
        .tx-card { padding: 10px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; font-weight: bold; background: #0b0c10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .approved { border-left: 6px solid #2ecc71; color: #2ecc71; }
        .declined { border-left: 6px solid #e74c3c; background: #3a1c1c; color: #ff7675; }
        
        /* Glowing status dot */
        .glowing-dot {
            height: 10px; width: 10px; background-color: #2ecc71;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px #2ecc71; margin-right: 8px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4" style="background-color: #1f2833;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h3">🛡️ Live Fraud Monitor</span>
            <span class="text-light d-flex align-items-center" style="color: #c5c6c7 !important;">
                <span class="glowing-dot"></span> Live System Status: ACTIVE
            </span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            
            <div class="col-lg-8">
                <div class="card stat-card mb-4">
                    <div class="card-header border-secondary text-uppercase fw-bold" style="color: #66fcf1;">
                        Real-Time Intervention Feed
                    </div>
                    <div class="card-body terminal-feed" id="transaction-feed">
                        <p class="text-muted" id="loading-text">Listening for live transactions...</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                
                <div class="row mb-4">
                    <div class="col-6">
                        <div class="card stat-card text-center p-3">
                            <h6 class="text-muted text-uppercase">Total Processed</h6>
                            <h2 id="total-tx" style="color: #66fcf1;" class="mb-0">0</h2>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card text-center p-3" style="background-color: #3a1c1c; border: 1px solid #e74c3c;">
                            <h6 class="text-danger text-uppercase">Fraud Blocked</h6>
                            <h2 id="total-fraud-amt" class="text-light mb-0">$0</h2>
                        </div>
                    </div>
                </div>

                <div class="card stat-card">
                    <div class="card-header border-secondary text-uppercase fw-bold" style="color: #66fcf1;">
                        Real-Time AI Decisions
                    </div>
                    <div class="card-body">
                        <canvas id="fraudChart"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        // Auto-connect to the correct port
        var socket = io();

        // Analytics Trackers
        var totalTx = 0;
        var fraudBlockedAmount = 0;
        var approvedCount = 0;
        var fraudCount = 0;

        // Initialize Chart.js Doughnut Chart
        var ctx = document.getElementById('fraudChart').getContext('2d');
        var fraudChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Approved', 'Fraud Blocked'],
                datasets: [{
                    data: [0, 0],
                    backgroundColor: ['#2ecc71', '#e74c3c'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: '#c5c6c7' } } } }
        });

        // Listen for the 'new_transaction' event from server.py
        socket.on('new_transaction', function(data) {
            
            // Remove the "Listening..." text once data arrives
            var loadingText = document.getElementById('loading-text');
            if (loadingText) {
                loadingText.remove();
            }

            // 1. Update Total Tracker
            totalTx++;

            // 2. Create the new transaction DOM element
            var feed = document.getElementById('transaction-feed');
            var newMessage = document.createElement('div');
            
            // 3. Apply your specific text logic and custom CSS classes
            if (data.status === 'DECLINED (FRAUD)') {
                fraudCount++;
                fraudBlockedAmount += parseFloat(data.amount);
                
                newMessage.className = 'tx-card declined';
                newMessage.innerHTML = `<span>🚨 FRAUD BLOCKED</span> <span>$${data.amount} to ${data.vendor}</span>`; 
            } else {
                approvedCount++;
                
                newMessage.className = 'tx-card approved';
                newMessage.innerHTML = `<span>✅ APPROVED</span> <span>$${data.amount} to ${data.vendor}</span>`;
            }
            
            feed.prepend(newMessage); // Adds new cards to the top

            // 4. Update the Numbers on the Screen
            document.getElementById('total-tx').innerText = totalTx;
            document.getElementById('total-fraud-amt').innerText = '$' + fraudBlockedAmount.toLocaleString('en-US');

            // 5. Animate the Chart
            fraudChart.data.datasets[0].data = [approvedCount, fraudCount];
            fraudChart.update();
        });
    </script>
</body>
</html>
